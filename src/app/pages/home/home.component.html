<div class="page-container">
  <section class="home-banner">
    <div class="home-content">
      <div class="home-card">
        <p>You've built the business. Now the brand.</p>
        <h2><span>Brand Identity.</span><br>Your Business Deserves.</h2>
        <app-button inverse="true" filled="true" label="Let’s talk" [iconRight]="appService.isDarkTheme ? 'talk' : 'talk-dark'"></app-button>
      </div>
      <div class="batch-card">
        <div class="marquee-wrap">
          <div class="marquee-track">
            <app-badge label="UI/UX"></app-badge>
            <app-badge label="Branding"></app-badge>
            <app-badge label="Logo"></app-badge>
            <app-badge label="Illustration"></app-badge>
            <app-badge label="Typography"></app-badge>
            <app-badge label="Design system"></app-badge>
            <app-badge label="Branding kit"></app-badge>
            <app-badge label="UI/UX"></app-badge>
            <app-badge label="Branding"></app-badge>
            <app-badge label="Logo"></app-badge>
            <app-badge label="Illustration"></app-badge>
            <app-badge label="Typography"></app-badge>
            <app-badge label="Design system"></app-badge>
            <app-badge label="Branding kit"></app-badge>
          </div>
        </div>
      </div>
    </div>
    <div class="home-banner-img">
      <img src="banner.webp" alt="Satheesh — brand identity designer based in Tamil Nadu India working with startups worldwide" fetchpriority="high" />
    </div>
  </section>
  <section class="work-cards">
    <app-work-card *ngFor="let work of homeWorkInfo" [title]="work.title" [description]="work.description" [labels]="work.labels" [image]="work.image" [imageAlt]="work.imageAlt" [id]="work.id" [badge]="work.badge" [badgeAlt]="work.badgeAlt"></app-work-card>
  </section>
</div>
